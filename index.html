<body>
  <div class="ambience" aria-hidden="true"></div>

  <!-- 상단 내비게이션 -->

      <div class="brand">
        <div class="brand-logo" data-icon="briefcase"></div>

      </div>
      <div style="display:flex;align-items:center;gap:.4rem;max-width:100%">

          <button class="mode-btn active" data-mode="card" aria-pressed="true"><span data-icon="bookOpen"></span><span>Card</span></button>
